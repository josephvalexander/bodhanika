<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0d1b2a"/>
  <!-- Nucleus -->
  <circle cx="16" cy="16" r="3.5" fill="#ffffff"/>
  <!-- Orbit 1: emerald -->
  <ellipse cx="16" cy="16" rx="12" ry="4.8"
    fill="none" stroke="#34D399" stroke-width="1.4"
    transform="rotate(0 16 16)"/>
  <!-- Orbit 2: blue -->
  <ellipse cx="16" cy="16" rx="12" ry="4.8"
    fill="none" stroke="#60A5FA" stroke-width="1.1"
    transform="rotate(60 16 16)"/>
  <!-- Orbit 3: amber -->
  <ellipse cx="16" cy="16" rx="12" ry="4.8"
    fill="none" stroke="#FCD34D" stroke-width="1.1"
    transform="rotate(120 16 16)"/>
  <!-- Electrons -->
  <circle cx="28" cy="16" r="1.8" fill="#34D399"/>
  <circle cx="10" cy="21" r="1.5" fill="#60A5FA"/>
  <circle cx="10" cy="11" r="1.5" fill="#FCD34D"/>
</svg>
