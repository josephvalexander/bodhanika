<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Bodhanika — App Icon
    Dark navy background baked in — works on all home screens
    Maskable: safe zone is central 80% (102px inset on each side)
    Knot scaled and centered within safe zone
  -->

  <!-- Background: dark navy with subtle radial warmth -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#112240"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
  </defs>

  <!-- Full background fill -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="0"/>

  <!-- Infinity knot — scaled to sit within maskable safe zone -->
  <!-- Original viewBox 0 0 512 512, knot spans ~44 to 468 -->
  <!-- Scale to ~65% and center so it fits comfortably in safe zone -->
  <g transform="translate(256,252) scale(0.62)">
    <!-- Outer knot — solid emerald -->
    <path d="M 0,0
      C 0,-60 -62,-120 -118,-120
      C -174,-120 -212,-76 -212,-28
      C -212,32 -160,74 -106,60
      C -58,48 -26,8 0,0
      C 26,-8 58,-52 106,-64
      C 162,-78 212,-34 212,24
      C 212,74 174,118 118,118
      C 62,118 0,58 0,0 Z"
      fill="none" stroke="#34D399" stroke-width="34"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Inner path — dashed blue -->
    <path d="M -118,-120
      C -160,-120 -212,-86 -212,-28
      C -212,2 -196,30 -170,46
      C -116,82 -50,38 0,0
      C 50,-38 116,-82 170,-44
      C 202,-24 212,6 212,24
      C 212,86 154,118 118,118
      C 62,118 12,74 0,0"
      fill="none" stroke="#60A5FA" stroke-width="22"
      stroke-linecap="round" stroke-linejoin="round"
      stroke-dasharray="40,26"/>

    <!-- Gold centre node -->
    <circle cx="0" cy="0" r="30" fill="#0a1628"/>
    <circle cx="0" cy="0" r="22" fill="#FCD34D"/>
    <circle cx="0" cy="0" r="11" fill="#FFFBEB"/>
    <circle cx="-8" cy="-8" r="4.5" fill="white" opacity="0.5"/>
  </g>
</svg>
